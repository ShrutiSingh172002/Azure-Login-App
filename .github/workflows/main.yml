name: Build and Deploy .NET App to Azure

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: AzureLogin   # ✅ Your actual App Service name
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Dependencies
      run: dotnet restore Azure_Login-main/LoginApp.csproj

    - name: Build
      run: dotnet build Azure_Login-main/LoginApp.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish Azure_Login-main/LoginApp.csproj -c Release -o ./publish

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
